<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Интерференция: Финальная версия</title>
    <style>
        /* Использование dvh для идеального вписывания в мобильные браузеры */
        :root { --app-height: 100dvh; }

        body, html {
            margin: 0; padding: 0; 
            width: 100vw; height: var(--app-height);
            overflow: hidden; background-color: #000;
            color: white; font-family: sans-serif;
            position: fixed; /* Предотвращает случайный скролл */
        }

        #app-wrapper {
            position: relative;
            width: 100vw; height: var(--app-height);
        }

        #orientation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; z-index: 3000; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        @media (orientation: portrait) { #orientation-overlay { display: flex; } }

        canvas { display: block; width: 100%; height: 100%; }

        /* Кнопки управления */
        .ui-btn {
            position: fixed; z-index: 1001; background: rgba(50,50,50,0.8); 
            border: 1px solid #555; color: white; padding: 12px; 
            border-radius: 8px; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        #menu-toggle { top: 10px; right: 10px; }
        #fullscreen-btn { top: 10px; right: 70px; font-size: 16px; }

        #side-menu {
            position: fixed; top: 0; right: -320px; width: 280px; height: 100%;
            background: rgba(15, 15, 15, 0.95); transition: 0.3s ease;
            z-index: 1000; padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.8);
            overflow-y: auto; border-left: 1px solid #333;
            box-sizing: border-box;
        }
        #side-menu.open { right: 0; }

        .control-block { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #333; }
        .block-title { font-size: 13px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
        input[type=range] { width: 100%; height: 25px; cursor: pointer; }
        .val { font-size: 12px; color: #3498db; float: right; font-weight: bold; }
        
        .w1 { color: #ff4d4d; }
        .w2 { color: #3498db; }

        .mode-btn {
            background: #222; padding: 10px; border-radius: 6px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 12px; cursor: pointer; border: 1px solid #444; transition: 0.2s;
        }
        .mode-btn.active { background: #2980b9; border-color: #fff; }
    </style>
</head>
<body>

    <div id="orientation-overlay"><h2>🔄 Переверните устройство</h2></div>

    <div id="app-wrapper">
        <button id="fullscreen-btn" class="ui-btn">⛶</button>
        <button id="menu-toggle" class="ui-btn">⚙️</button>

        <div id="side-menu">
            <h3 style="margin-top: 0; color: #fff;">Настройки</h3>
            
            <div id="coherent-btn" class="mode-btn">Когерентный свет <span>OFF</span></div>

            <div class="control-block">
                <div class="block-title w1">Волна 1 (Красная)</div>
                <div class="control-group">
                    <label>Частота ω: <span class="val" id="f1-v">3.0</span></label>
                    <input type="range" id="f1" min="0" max="8" step="0.1" value="3.0">
                </div>
                <div class="control-group">
                    <label>Показатель n₁: <span class="val" id="n1-v">1.0</span></label>
                    <input type="range" id="n1" min="1" max="4" step="0.1" value="1.0">
                </div>
            </div>

            <div class="control-block">
                <div class="block-title w2">Волна 2 (Синяя)</div>
                <div class="control-group" id="f2-group">
                    <label>Частота ω₂: <span class="val" id="f2-v">3.2</span></label>
                    <input type="range" id="f2" min="0" max="8" step="0.1" value="3.2">
                </div>
                <div class="control-group" id="phase-group" style="display:none;">
                    <label>Разность фаз Δφ: <span class="val" id="ph-v">0°</span></label>
                    <input type="range" id="phase" min="0" max="360" step="5" value="0">
                </div>
                <div class="control-group">
                    <label>Показатель n₂: <span class="val" id="n2-v">1.0</span></label>
                    <input type="range" id="n2" min="1" max="4" step="0.1" value="1.0">
                </div>
            </div>

            <div class="control-block">
                <div class="block-title">Время</div>
                <input type="range" id="timeScale" min="0" max="2" step="0.05" value="0.4">
                <div style="text-align: center; font-size: 10px; color: #555; margin-top: 5px;">Замедление / Пауза</div>
            </div>
            <button onclick="window.location.href='index.html'" class="ui-btn">На главную</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const menu = document.getElementById('side-menu');
    const cohBtn = document.getElementById('coherent-btn');

    // Переключение меню
    document.getElementById('menu-toggle').onclick = (e) => {
        menu.classList.toggle('open');
        e.stopPropagation();
    };

    // Полноэкранный режим
    document.getElementById('fullscreen-btn').onclick = () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {});
        } else {
            document.exitFullscreen();
        }
    };

    let coherentMode = false;
    cohBtn.onclick = () => {
        coherentMode = !coherentMode;
        cohBtn.classList.toggle('active', coherentMode);
        cohBtn.querySelector('span').innerText = coherentMode ? "ON" : "OFF";
        document.getElementById('f2-group').style.display = coherentMode ? 'none' : 'block';
        document.getElementById('phase-group').style.display = coherentMode ? 'block' : 'none';
    };

    const inpt = {
        f1: document.getElementById('f1'), n1: document.getElementById('n1'),
        f2: document.getElementById('f2'), n2: document.getElementById('n2'),
        ph: document.getElementById('phase'), ts: document.getElementById('timeScale')
    };
    const disp = {
        f1: document.getElementById('f1-v'), n1: document.getElementById('n1-v'),
        f2: document.getElementById('f2-v'), n2: document.getElementById('n2-v'),
        ph: document.getElementById('ph-v')
    };

    let w, h;
    let a1 = 0, a2 = 0;
    let wave1 = [], wave2 = [], waveRes = [];

    const radius = 18; 
    const cx = 30;
    const cBase = 4;

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight; // Используем текущую высоту окна
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    setInterval(resize, 1000); // Доп. проверка размера каждую секунду (для мобил)
    resize();

    function animate() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, w, h);

        const ts = parseFloat(inpt.ts.value);
        const f1 = parseFloat(inpt.f1.value);
        const f2 = coherentMode ? f1 : parseFloat(inpt.f2.value);
        const n1 = parseFloat(inpt.n1.value);
        const n2 = parseFloat(inpt.n2.value);
        const ph = (parseFloat(inpt.ph.value) * Math.PI) / 180;

        disp.f1.innerText = f1.toFixed(1);
        disp.n1.innerText = n1.toFixed(1);
        disp.f2.innerText = f2.toFixed(1);
        disp.n2.innerText = n2.toFixed(1);
        disp.ph.innerText = inpt.ph.value + "°";

        const v1 = cBase / n1;
        const v2 = cBase / n2;
        const vRes = cBase / ((n1 + n2) / 2);

        // Распределение волн по высоте (с запасом, чтобы не вылетали)
        const y1Pos = h * 0.15;
        const yMid = h * 0.5;
        const y2Pos = h * 0.85;

        if (ts > 0) {
            a1 -= 0.05 * f1 * ts;
            if (coherentMode) a2 = a1 - ph;
            else a2 -= 0.05 * f2 * ts;

            wave1.forEach(p => p.x += v1 * ts);
            wave2.forEach(p => p.x += v2 * ts);
            waveRes.forEach(p => p.x += vRes * ts);

            wave1.unshift({ x: cx, y: y1Pos + Math.sin(a1) * radius });
            wave2.unshift({ x: cx, y: y2Pos + Math.sin(a2) * radius });
            waveRes.unshift({ x: cx, y: yMid + (Math.sin(a1) + Math.sin(a2)) * radius });

            if (wave1.length > 800) wave1.pop();
            if (wave2.length > 800) wave2.pop();
            if (waveRes.length > 800) waveRes.pop();
        }

        // Отрисовка осей
        ctx.strokeStyle = '#111';
        [y1Pos, yMid, y2Pos].forEach(y => {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        });

        const xV1 = Math.cos(a1) * radius, yV1 = Math.sin(a1) * radius;
        const xV2 = Math.cos(a2) * radius, yV2 = Math.sin(a2) * radius;

        const drawC = (y) => {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(cx, y, radius, 0, Math.PI*2); ctx.stroke();
        };

        // Векторы 1 и 2
        drawC(y1Pos);
        ctx.strokeStyle = '#ff4d4d'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, y1Pos); ctx.lineTo(cx + xV1, y1Pos + yV1); ctx.stroke();

        drawC(y2Pos);
        ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(cx, y2Pos); ctx.lineTo(cx + xV2, y2Pos + yV2); ctx.stroke();

        // Центр - Сложение ТРЕУГОЛЬНИКОМ
        drawC(yMid);
        // Красный (начало)
        ctx.strokeStyle = '#ff4d4d'; ctx.beginPath(); ctx.moveTo(cx, yMid); ctx.lineTo(cx + xV1, yMid + yV1); ctx.stroke();
        // Синий (из конца красного)
        ctx.strokeStyle = '#3498db'; ctx.beginPath(); ctx.moveTo(cx + xV1, yMid + yV1); ctx.lineTo(cx + xV1 + xV2, yMid + yV1 + yV2); ctx.stroke();
        // Результат
        ctx.strokeStyle = '#a29bfe'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(cx, yMid); ctx.lineTo(cx + xV1 + xV2, yMid + yV1 + yV2); ctx.stroke();

        const drW = (pts, clr) => {
            if (pts.length < 2) return;
            ctx.strokeStyle = clr; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for(let i=1; i<pts.length; i++) if(pts[i].x < w) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
        };
        drW(wave1, '#ff4d4d'); drW(wave2, '#3498db'); drW(waveRes, '#a29bfe');

        requestAnimationFrame(animate);
    }
    animate();
</script>
</body>
</html>
